  <text x="220" y="212" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2">PUBLICATION UMBRELLA REPOSITORY</text>
  <text x="220" y="284" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800">CURE-NGS Panel Harmonization Framework</text>
