      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#123C6B"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="card" x1="220" y1="140" x2="1040" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="120" y="92" width="1040" height="448" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#020617" flood-opacity="0.35"/>
